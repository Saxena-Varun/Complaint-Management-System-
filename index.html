<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complaint Management System - Professional Grievance Portal">
    <title>Complaint Management System | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --text-main: #f1f5f9;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .hero-canvas {
            height: 100vh;
            width: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
                        linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .neo-logo {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .neo-logo span { color: var(--primary); }

        .tagline {
            font-size: 1.25rem;
            color: #94a3b8;
            max-width: 600px;
            margin-bottom: 3rem;
            line-height: 1.6;
            animation: fadeInUp 1s ease 0.2s backwards;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 280px);
            gap: 2rem;
            animation: fadeInUp 1s ease 0.4s backwards;
        }

        .portal-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 24px;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .portal-btn:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .portal-btn i {
            display: block;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .portal-btn h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .portal-btn p {
            font-size: 0.9rem;
            color: #64748b;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bg-glow {
            position: absolute;
            width: 400px; height: 400px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.05;
            z-index: 0;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="hero-canvas">
        <div class="bg-glow"></div>
        
        <h1 class="neo-logo">COMPLAINT <span>SYSTEM</span></h1>
        
        <p class="tagline">A professional portal for citizen grievances. Integrated, automated, and secure management of complaints at scale.</p>

        <div class="portal-grid">
            <a href="users/index.php" class="portal-btn">
                <i class="fas fa-user-shield"></i>
                <h3>User Portal</h3>
                <p>Register & track reports</p>
            </a>
            
            <a href="admin/index.php" class="portal-btn">
                <i class="fas fa-microchip"></i>
                <h3>Admin Portal</h3>
                <p>System management & oversight</p>
            </a>
        </div>
    </div>
</body>
</html>
